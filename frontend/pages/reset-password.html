<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — EstateHub</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="min-h-screen px-4 py-10 text-white auth-background">
  <main class="mx-auto w-full max-w-md px-2">
    <div class="auth-panel light rounded-[2rem] p-10">
      <a href="./index.html" class="mb-6 block text-center bg-gradient-to-r from-purple-600 to-indigo-600 bg-clip-text text-2xl font-bold text-transparent">EstateHub</a>
    <h1 class="mb-6 text-center text-xl font-semibold">Set new password</h1>
    <div id="message" class="hidden rounded-xl p-3 text-sm mb-4"></div>
    <div class="space-y-4">
      <input id="newPassword" type="password" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:border-indigo-400 focus:outline-none" placeholder="New password (min 8 chars)" />
      <input id="confirmPassword" type="password" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:border-indigo-400 focus:outline-none" placeholder="Confirm new password" />
      <button id="resetBtn" type="button" class="w-full rounded-xl bg-gradient-to-r from-purple-600 to-indigo-600 py-3 text-sm font-semibold text-white shadow transition hover:opacity-90">Reset password</button>
    </div>
  </main>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    const token = new URLSearchParams(window.location.search).get("token");
    if (!token) {
      const msg = document.getElementById("message");
      msg.className = "rounded-xl p-3 text-sm mb-4 bg-rose-50 text-rose-700";
      msg.textContent = "Invalid reset link.";
    }
    document.getElementById("resetBtn").addEventListener("click", async () => {
      const btn = document.getElementById("resetBtn");
      const newPassword = document.getElementById("newPassword").value;
      const confirm = document.getElementById("confirmPassword").value;
      if (newPassword !== confirm) {
        ui.setMessage("message", "Passwords do not match.", true);
        document.getElementById("message").classList.remove("hidden");
        return;
      }
      btn.disabled = true;
      btn.textContent = "Resetting...";
      try {
        await api.request("/auth/reset-password", {
          method: "POST",
          body: JSON.stringify({ token, newPassword }),
        });
        ui.setMessage("message", "Password reset! Redirecting to login...", false);
        document.getElementById("message").classList.remove("hidden");
        setTimeout(() => {
          window.location.href = "./login.html";
        }, 2000);
      } catch (e) {
        ui.setMessage("message", e.message, true);
        document.getElementById("message").classList.remove("hidden");
        btn.disabled = false;
        btn.textContent = "Reset password";
      }
    });
  </script>
</body>
</html>
