<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Details</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="sticky top-0 z-50 border-b border-white/30 bg-white/70 backdrop-blur-lg">
    <nav class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 md:px-6">
      <a href="./index.html" class="bg-gradient-to-r from-purple-700 to-slate-900 bg-clip-text text-xl font-bold text-transparent">EstateHub</a>
      <div class="flex flex-wrap items-center gap-2 text-sm font-medium">
        <a class="rounded-lg px-3 py-2 transition hover:bg-indigo-50" href="./index.html">Home</a>
        <a data-auth="guest" class="rounded-lg px-3 py-2 transition hover:bg-indigo-50" href="./login.html">Login</a>
        <a data-auth="user" href="./profile.html" class="rounded-lg px-3 py-2 text-sm font-medium transition hover:bg-indigo-50">My Profile</a>
        <a data-auth="user" data-role="buyer" class="rounded-lg px-3 py-2 transition hover:bg-indigo-50" href="./buyer-dashboard.html">Buyer Dashboard</a>
        <a data-auth="user" data-role="seller" class="rounded-lg px-3 py-2 transition hover:bg-indigo-50" href="./seller-dashboard.html">Seller Dashboard</a>
        <a data-auth="user" data-role="admin" class="rounded-lg px-3 py-2 transition hover:bg-indigo-50" href="./admin-panel.html">Admin Panel</a>
        <button data-auth="user" id="logoutBtn" type="button" class="rounded-lg border border-indigo-200 px-3 py-2 text-sm font-medium text-indigo-700 transition hover:bg-indigo-50">Logout</button>
      </div>
    </nav>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-10 md:px-6">
    <p id="detailsLoading"></p>
    <p id="detailsMessage"></p>
    <section class="panel-card rounded-[2rem] p-6 shadow-2xl">
      <div class="mb-6 rounded-[1.75rem] bg-slate-950/95 p-6 text-white shadow-2xl">
        <h1 id="propertyTitle" class="text-3xl font-semibold md:text-4xl">Property</h1>
        <p id="propertyPrice" class="mt-3 text-3xl font-bold text-purple-700"></p>
        <p id="propertyMeta" class="mt-2 text-sm text-slate-300"></p>
      </div>
      <div id="gallery" class="mt-5 grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3"></div>

      <div class="mt-6 grid grid-cols-1 gap-5 lg:grid-cols-3">
        <div class="lg:col-span-2">
          <h3 class="text-lg font-semibold">Description</h3>
          <p id="propertyDescription" class="mt-2 leading-relaxed text-slate-600"></p>
          <h3 class="mt-6 text-lg font-semibold">Amenities</h3>
          <ul id="amenitiesList" class="mt-2 list-disc space-y-1 pl-5 text-slate-600"></ul>
        </div>
        <div class="space-y-4">
          <div class="panel-card rounded-3xl p-4 shadow-xl">
            <h3 class="mb-2 text-lg font-semibold">Location</h3>
            <div id="mapContainer" class="map-container overflow-hidden rounded-2xl border border-slate-200 shadow-sm">
              <div id="propertyMap" class="property-map"></div>
              <p id="mapFallback" class="hidden p-4 text-sm text-slate-500">Location not available</p>
            </div>
          </div>

          <div class="panel-card rounded-3xl p-4 shadow-xl">
            <h3 class="text-lg font-semibold">Contact Owner</h3>
            <form id="contactForm" class="mt-3 hidden space-y-3">
              <textarea id="inquiryMessage" class="w-full rounded-xl border border-slate-200 px-3 py-2 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200" placeholder="Message" required></textarea>
              <input id="inquiryPhone" class="w-full rounded-xl border border-slate-200 px-3 py-2 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200" placeholder="Your phone (optional)" />
              <button class="w-full rounded-xl bg-gradient-to-r from-purple-600 to-indigo-600 px-4 py-2 font-semibold text-white shadow-md transition hover:opacity-90" type="submit">Send Inquiry</button>
            </form>
            <p id="contactLoading"></p>
            <p id="contactMessage"></p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/property-details.js"></script>
</body>
</html>
