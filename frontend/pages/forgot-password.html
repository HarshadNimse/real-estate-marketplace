<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — EstateHub</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="min-h-screen auth-background">
  <div class="mx-auto my-10 w-full max-w-md rounded-[2rem] auth-panel light p-10">
    <a href="./index.html" class="mb-6 block text-center bg-gradient-to-r from-purple-600 to-indigo-600 bg-clip-text text-2xl font-bold text-transparent">EstateHub</a>
    <h1 class="mb-1 text-center text-xl font-semibold">Forgot password</h1>
    <p class="mb-6 text-center text-sm text-slate-500">Enter your email and we'll send a reset link.</p>
    <div id="message" class="hidden rounded-xl p-3 text-sm mb-4"></div>
    <div class="space-y-4">
      <input id="email" type="email" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-100" placeholder="you@example.com" />
      <button id="submitBtn" type="button" class="w-full rounded-xl bg-gradient-to-r from-purple-600 to-indigo-600 py-3 text-sm font-semibold text-white shadow transition hover:opacity-90">Send reset link</button>
    </div>
    <p class="mt-4 text-center text-sm text-slate-500">Remember it? <a href="./login.html" class="font-medium text-indigo-600 hover:underline">Log in</a></p>
  </div>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    document.getElementById("submitBtn").addEventListener("click", async () => {
      const btn = document.getElementById("submitBtn");
      const email = document.getElementById("email").value.trim();
      if (!email) {
        ui.setMessage("message", "Email is required.", true);
        document.getElementById("message").classList.remove("hidden");
        return;
      }
      btn.disabled = true;
      btn.textContent = "Sending...";
      try {
        await api.request("/auth/forgot-password", {
          method: "POST",
          body: JSON.stringify({ email }),
        });
        ui.setMessage(
          "message",
          "If that email is registered, a reset link has been sent. Check your inbox (and spam folder).",
          false
        );
      } catch (e) {
        ui.setMessage("message", e.message, true);
      } finally {
        document.getElementById("message").classList.remove("hidden");
        btn.disabled = false;
        btn.textContent = "Send reset link";
      }
    });
  </script>
  <footer class="site-footer">
    <div class="site-footer__inner">
      <a class="site-footer__brand" href="./index.html">EstateHub</a>
      <p>Real Estate Marketplace Demo</p>
      <p class="site-footer__copyright">&copy; 2026 EstateHub. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
