<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buyer Dashboard</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="sticky top-0 z-50 border-b border-white/30 bg-white/80 backdrop-blur-lg">
    <nav class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 md:px-6">
      <a href="./index.html" class="bg-gradient-to-r from-purple-600 to-indigo-600 bg-clip-text text-xl font-bold text-transparent">EstateHub</a>
      <div class="flex items-center gap-2">
        <a href="./index.html" class="rounded-lg px-3 py-2 text-sm font-medium transition hover:bg-indigo-50">Home</a>
        <a data-auth="user" href="./profile.html" class="rounded-lg px-3 py-2 text-sm font-medium transition hover:bg-indigo-50">My Profile</a>
        <button id="logoutBtn" type="button" class="rounded-lg bg-gradient-to-r from-purple-600 to-indigo-600 px-3 py-2 text-sm font-medium text-white shadow-md transition hover:opacity-90">Logout</button>
      </div>
    </nav>
  </header>

  <main class="mx-auto max-w-7xl px-6 py-10 md:px-8">
    <section class="panel-card rounded-[2rem] bg-white/95 p-10 shadow-2xl">
      <div class="flex flex-col gap-6 lg:flex-row lg:items-center lg:justify-between">
        <div>
          <h2 class="text-3xl font-semibold text-slate-900">Buyer Dashboard</h2>
          <p class="mt-2 text-slate-600">Welcome back, <strong id="buyerName">Buyer</strong>. Track inquiries and find your next home faster.</p>
        </div>
        <div class="inline-flex items-center gap-3 rounded-full bg-indigo-50 px-4 py-3 text-sm font-semibold text-indigo-700 ring-1 ring-indigo-100">
          <span>Buyer tools</span>
          <span class="rounded-full bg-indigo-200 px-3 py-1 text-xs text-indigo-800">Premium UI</span>
        </div>
      </div>
      <div class="mt-8 grid gap-4 md:grid-cols-3">
        <div class="dashboard-summary-card bg-slate-50">
          <div class="text-sm uppercase tracking-[0.24em] text-slate-500">Total inquiries</div>
          <div id="buyerStatInquiries" class="mt-3 text-3xl font-bold text-slate-900">0</div>
        </div>
        <div class="dashboard-summary-card bg-indigo-50">
          <div class="text-sm uppercase tracking-[0.24em] text-indigo-700">Saved properties</div>
          <div id="buyerStatSaved" class="mt-3 text-3xl font-bold text-indigo-900">0</div>
        </div>
        <div class="dashboard-summary-card bg-emerald-50">
          <div class="text-sm uppercase tracking-[0.24em] text-emerald-700">Recent views</div>
          <div id="buyerStatViews" class="mt-3 text-3xl font-bold text-emerald-900">0</div>
        </div>
      </div>
      <p id="buyerLoading"></p>
      <p id="buyerMessage"></p>
      <h3 class="mt-4 text-lg font-semibold">Inquiry History</h3>
      <ul id="buyerInquiryList" class="mt-3 space-y-3"></ul>
      <div class="mt-4 flex gap-2">
        <button id="buyerPrev" type="button" class="rounded-lg border border-indigo-200 px-4 py-2 text-sm font-semibold text-indigo-700 transition hover:bg-indigo-50">Prev</button>
        <button id="buyerNext" type="button" class="rounded-lg border border-indigo-200 px-4 py-2 text-sm font-semibold text-indigo-700 transition hover:bg-indigo-50">Next</button>
      </div>
    </section>
  </main>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    // Enforce authentication and role-based access
    (function() {
      const user = auth.getUser();
      if (!user || user.role !== 'buyer') {
        window.location.href = './login.html';
      }
    })();
  </script>
  <script src="../js/buyer-dashboard.js"></script>
</body>
</html>
