<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buyer Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-50 to-indigo-50 text-slate-800">
  <header class="sticky top-0 z-50 border-b border-white/30 bg-white/70 backdrop-blur-lg">
    <nav class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 md:px-6">
      <a href="./index.html" class="bg-gradient-to-r from-purple-600 to-indigo-600 bg-clip-text text-xl font-bold text-transparent">EstateHub</a>
      <div class="flex items-center gap-2">
        <a href="./index.html" class="rounded-lg px-3 py-2 text-sm font-medium transition hover:bg-indigo-50">Home</a>
        <a data-auth="user" href="./profile.html" class="rounded-lg px-3 py-2 text-sm font-medium transition hover:bg-indigo-50">My Profile</a>
        <button id="logoutBtn" type="button" class="rounded-lg bg-gradient-to-r from-purple-600 to-indigo-600 px-3 py-2 text-sm font-medium text-white shadow-md transition hover:opacity-90">Logout</button>
      </div>
    </nav>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-6 md:px-6">
    <section class="rounded-2xl bg-white p-5 shadow-md md:p-6">
      <h2 class="text-2xl font-semibold">Buyer Dashboard</h2>
      <p class="mt-1 text-slate-600">Welcome, <strong id="buyerName">Buyer</strong></p>
      <p id="buyerLoading"></p>
      <p id="buyerMessage"></p>
      <h3 class="mt-4 text-lg font-semibold">Inquiry History</h3>
      <ul id="buyerInquiryList" class="mt-3 space-y-3"></ul>
      <div class="mt-4 flex gap-2">
        <button id="buyerPrev" type="button" class="rounded-lg border border-indigo-200 px-4 py-2 text-sm font-semibold text-indigo-700 transition hover:bg-indigo-50">Prev</button>
        <button id="buyerNext" type="button" class="rounded-lg border border-indigo-200 px-4 py-2 text-sm font-semibold text-indigo-700 transition hover:bg-indigo-50">Next</button>
      </div>
    </section>
  </main>

  <!-- Inquiry Chat Modal -->
  <div id="chatModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
    <div class="relative w-full max-w-lg rounded-2xl bg-white shadow-xl max-h-[85vh] overflow-hidden flex flex-col">
      <div class="flex items-center justify-between border-b border-slate-100 px-5 py-4 bg-indigo-50/50">
        <div>
          <h3 class="text-base font-bold text-slate-800" id="chatTitle">Listing Inquiry Chat</h3>
          <p class="text-xs text-slate-500 mt-0.5" id="chatSubtitle"></p>
        </div>
        <button id="closeChatBtn" type="button" class="text-slate-400 hover:text-slate-600 transition">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div id="chatMessages" class="flex-1 overflow-y-auto p-5 space-y-3 bg-slate-50 min-h-[300px] max-h-[450px]">
        <!-- Messages loaded dynamically -->
      </div>
      <form id="chatForm" class="border-t border-slate-100 p-4 flex gap-2 bg-white">
        <input id="chatInput" type="text" placeholder="Type your message..." required class="flex-1 rounded-xl border border-slate-200 px-4 py-2.5 text-sm focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-100" />
        <button type="submit" class="rounded-xl bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white shadow hover:bg-indigo-500 transition">Send</button>
      </form>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    // Enforce authentication and role-based access
    (function() {
      const user = auth.getUser();
      if (!user || user.role !== 'buyer') {
        window.location.href = './login.html';
      }
    })();
  </script>
  <script src="../js/buyer-dashboard.js"></script>
</body>
</html>
