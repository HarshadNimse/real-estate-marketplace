<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seller Property Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-50 to-indigo-50 text-slate-800">
  <header class="sticky top-0 z-50 border-b border-white/30 bg-white/70 backdrop-blur-lg">
    <nav class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 md:px-6">
      <a href="./index.html" class="bg-gradient-to-r from-purple-600 to-indigo-600 bg-clip-text text-xl font-bold text-transparent">EstateHub</a>
      <div class="flex items-center gap-2">
        <a href="./seller-dashboard.html" class="rounded-lg px-3 py-2 text-sm font-medium transition hover:bg-indigo-50">Seller Dashboard</a>
        <a data-auth="user" href="./profile.html" class="rounded-lg px-3 py-2 text-sm font-medium transition hover:bg-indigo-50">My Profile</a>
        <button id="logoutBtn" type="button" class="rounded-lg border border-indigo-200 px-3 py-2 text-sm font-medium text-indigo-700 transition hover:bg-indigo-50">Logout</button>
      </div>
    </nav>
  </header>

  <main class="mx-auto max-w-4xl px-4 py-6 md:px-6">
    <section class="rounded-2xl bg-white p-5 shadow-md md:p-6">
      <h2 id="pageTitle" class="text-2xl font-semibold">Create Property</h2>
      <form id="propertyForm">
        <div class="mt-4 grid grid-cols-1 gap-4 md:grid-cols-2">
          <div class="space-y-1">
            <input id="title" class="w-full rounded-xl border border-slate-200 px-3 py-2 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200" placeholder="Title *" required />
          </div>
          <div class="space-y-1">
            <input id="price" type="number" class="w-full rounded-xl border border-slate-200 px-3 py-2 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200" placeholder="Price *" required />
            <small class="text-xs text-slate-500">Enter in INR (e.g. 5000000)</small>
          </div>
          <input id="city" class="w-full rounded-xl border border-slate-200 px-3 py-2 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200" placeholder="City *" required />
          <input id="addressLine" class="w-full rounded-xl border border-slate-200 px-3 py-2 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200" placeholder="Address" />
          <div class="space-y-1">
            <input id="latitude" type="number" step="any" class="w-full rounded-xl border border-slate-200 px-3 py-2 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200" placeholder="Latitude *" required />
            <small class="text-xs text-slate-500">Latitude must be between -90 and 90</small>
          </div>
          <div class="space-y-1">
            <input id="longitude" type="number" step="any" class="w-full rounded-xl border border-slate-200 px-3 py-2 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200" placeholder="Longitude *" required />
            <small class="text-xs text-slate-500">Longitude must be between -180 and 180</small>
          </div>
          <select id="propertyType" aria-label="Property type" class="w-full rounded-xl border border-slate-200 px-3 py-2 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200" required>
            <option value="rent">Rent</option>
            <option value="sale">Sale</option>
          </select>
          <div class="space-y-1">
            <input id="bhk" type="number" class="w-full rounded-xl border border-slate-200 px-3 py-2 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200" placeholder="BHK *" required />
            <small class="text-xs text-slate-500">BHK range: 1-20 only</small>
          </div>
          <input id="areaSqft" type="number" class="w-full rounded-xl border border-slate-200 px-3 py-2 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200" placeholder="Area (sqft) *" required />
          <select id="furnishing" aria-label="Furnishing type" class="w-full rounded-xl border border-slate-200 px-3 py-2 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200">
            <option value="unfurnished">Unfurnished</option>
            <option value="semi">Semi</option>
            <option value="furnished">Furnished</option>
          </select>
        </div>
        <textarea id="description" class="mt-4 w-full rounded-xl border border-slate-200 px-3 py-2 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200" placeholder="Description *" required></textarea>
        <fieldset class="mt-4 rounded-xl border border-slate-200 p-4">
          <legend class="px-1 text-sm font-semibold text-slate-700">Amenities</legend>
          <div id="amenitiesCheckboxes" class="mt-2 grid grid-cols-2 gap-2 text-sm md:grid-cols-3">
            <label class="flex items-center gap-2"><input type="checkbox" class="amenity-cb" value="Lift" /> Lift</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="amenity-cb" value="Parking" /> Parking</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="amenity-cb" value="Power Backup" /> Power Backup</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="amenity-cb" value="Gym" /> Gym</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="amenity-cb" value="Swimming Pool" /> Swimming Pool</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="amenity-cb" value="Security" /> Security</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="amenity-cb" value="Garden" /> Garden</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="amenity-cb" value="Club House" /> Club House</label>
          </div>
          <input id="amenityOther" class="mt-3 w-full rounded-xl border border-slate-200 px-3 py-2 text-sm" placeholder="Other (comma-separated)" />
        </fieldset>
        <div class="drop-zone mt-4 p-6 text-center cursor-pointer" id="dropZone">
          <input id="images" title="Upload property images" type="file" accept="image/*" multiple class="hidden" />
          <div class="flex flex-col items-center gap-2">
            <svg class="h-10 w-10 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <p class="text-sm font-medium text-slate-700">Drop images here or <span class="text-indigo-600 underline">browse</span></p>
            <p class="text-xs text-slate-400">Up to 10 images · Max 5 MB each · JPG, PNG, WebP</p>
          </div>
        </div>
        <div id="existingImages" class="mt-4 grid grid-cols-2 gap-3 md:grid-cols-3"></div>
        <div id="imagePreview" class="mt-3 grid grid-cols-2 gap-2 sm:grid-cols-3"></div>
        <button id="submitBtn" class="mt-4 rounded-xl bg-gradient-to-r from-purple-600 to-indigo-600 px-5 py-2.5 font-semibold text-white shadow-md transition hover:opacity-90" type="submit">Create Property</button>
      </form>
      <p id="formLoading"></p>
      <p id="formMessage"></p>
    </section>
  </main>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    // Enforce authentication and role-based access
    (function() {
      const user = auth.getUser();
      if (!user || user.role !== 'seller') {
        window.location.href = './login.html';
      }
    })();
  </script>
  <script src="../js/seller-property-form.js"></script>
</body>
</html>
