<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email — EstateHub</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="min-h-screen px-4 py-10 text-slate-900 auth-background">
  <main class="mx-auto flex min-h-screen max-w-md flex-col justify-center px-4 py-8">
    <div class="rounded-[2rem] auth-panel light p-10">
      <h1 class="text-xl font-semibold">Verify your email</h1>
      <p id="verifyMessage" class="mt-4 text-sm text-slate-600">Verifying...</p>
      <a href="./login.html" class="mt-6 inline-block text-sm font-semibold text-indigo-600 hover:underline">Back to login</a>
    </div>
  </main>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    (async function () {
      const token = new URLSearchParams(window.location.search).get("token");
      const el = document.getElementById("verifyMessage");
      if (!token) {
        el.textContent = "Missing verification token.";
        el.classList.add("text-rose-600");
        return;
      }
      try {
        const res = await fetch(`${window.APP_CONFIG.API_BASE_URL}/auth/verify-email`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token }),
        });
        const body = await res.json();
        if (!res.ok || !body.success) throw new Error(body.message || "Verification failed.");
        el.textContent = body.message || "Email verified! You can log in now.";
        el.classList.add("text-emerald-700");
      } catch (e) {
        el.textContent = e.message;
        el.classList.add("text-rose-600");
      }
    })();
  </script>
</body>
</html>
