<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — EstateHub</title>
  <link rel="stylesheet" href="../css/tailwind.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="sticky top-0 z-50 border-b border-white/30 bg-white/80 backdrop-blur-lg">
    <nav class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 md:px-6">
      <a href="./index.html" class="bg-gradient-to-r from-purple-600 to-indigo-600 bg-clip-text text-xl font-bold text-transparent">EstateHub</a>
      <div class="flex items-center gap-3">
        <a href="./index.html" class="rounded-lg px-3 py-2 text-sm font-medium transition hover:bg-indigo-50">Home</a>
        <a id="dashboardLink" class="rounded-lg px-3 py-2 text-sm font-medium transition hover:bg-indigo-50">Dashboard</a>
        <button id="logoutBtn" type="button" class="rounded-lg bg-gradient-to-r from-purple-600 to-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow transition hover:opacity-90">Logout</button>
      </div>
    </nav>
  </header>

  <main class="mx-auto max-w-6xl space-y-8 px-6 py-10 md:px-8">
    <div class="panel-card rounded-[2rem] p-10">
      <div class="mb-6 flex flex-col gap-6 rounded-[2rem] bg-slate-50 p-6 shadow-inner sm:flex-row sm:items-center sm:justify-between">
        <div class="flex h-16 w-16 items-center justify-center rounded-full bg-gradient-to-br from-purple-500 to-indigo-600 text-2xl font-bold text-white" id="avatarInitials">?</div>
        <div>
          <h1 class="text-xl font-semibold" id="profileName">Loading...</h1>
          <p class="text-sm text-slate-500" id="profileRole"></p>
        </div>
      </div>

      <div id="profileMessage" class="hidden rounded-xl p-3 text-sm mb-4"></div>

      <h2 class="mb-3 text-base font-semibold">Update profile</h2>
      <div class="space-y-4">
        <div>
          <label class="mb-1 block text-sm font-medium text-slate-700">Full name *</label>
          <input id="fullName" type="text" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-100" placeholder="Full name" />
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium text-slate-700">Email</label>
          <input id="profileEmail" type="email" title="Profile email" placeholder="Email" class="w-full cursor-not-allowed rounded-xl border border-slate-100 bg-slate-50 px-4 py-3 text-sm text-slate-400" disabled />
          <p id="emailVerifyStatus" class="mt-2 text-sm text-slate-600"></p>
          <button id="sendVerifyEmailBtn" type="button" class="mt-2 hidden rounded-lg border border-indigo-200 bg-indigo-50 px-3 py-1.5 text-xs font-semibold text-indigo-700 hover:bg-indigo-100">Send verification email</button>
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium text-slate-700">Phone</label>
          <input id="profilePhone" type="tel" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-100" placeholder="+91 XXXXX XXXXX" />
        </div>
        <button id="saveProfileBtn" type="button" class="w-full rounded-xl bg-gradient-to-r from-purple-600 to-indigo-600 py-3 text-sm font-semibold text-white shadow transition hover:opacity-90">Save changes</button>
      </div>
    </div>

    <div class="panel-card rounded-[2rem] p-10">
      <h2 class="mb-3 text-base font-semibold">Change password</h2>
      <div id="passwordMessage" class="hidden rounded-xl p-3 text-sm mb-4"></div>
      <div class="space-y-4">
        <div>
          <label class="mb-1 block text-sm font-medium text-slate-700">Current password</label>
          <input id="currentPassword" type="password" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:border-indigo-400 focus:outline-none" placeholder="Current password" />
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium text-slate-700">New password</label>
          <input id="newPassword" type="password" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:border-indigo-400 focus:outline-none" placeholder="Min 8 characters" />
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium text-slate-700">Confirm new password</label>
          <input id="confirmPassword" type="password" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:border-indigo-400 focus:outline-none" placeholder="Repeat new password" />
        </div>
        <button id="changePasswordBtn" type="button" class="w-full rounded-xl bg-slate-800 py-3 text-sm font-semibold text-white transition hover:bg-slate-700">Change password</button>
      </div>
    </div>

    <div class="panel-card rounded-[2rem] p-10" id="favouritesSection">
      <h2 class="mb-3 text-base font-semibold">Saved properties</h2>
      <ul id="favouritesList" class="space-y-3">
        <li class="text-sm text-slate-500">Loading...</li>
      </ul>
    </div>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    // Enforce authentication
    (function() {
      if (!auth.getUser()) {
        window.location.href = './login.html';
      }
    })();
  </script>
  <script src="../js/profile.js"></script>
</body>
</html>
